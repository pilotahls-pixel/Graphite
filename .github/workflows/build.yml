name: Build Graphite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create API_KEYS file
        run: |
          echo "APP_ID=${{ secrets.API_ID }}" > API_KEYS
          echo "APP_HASH=${{ secrets.API_HASH }}" >> API_KEYS
          echo "MAPS_V2_API=" >> API_KEYS

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleAfatRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Graphite
          path: TMessagesProj_App/build/outputs/apk/afat/release/*.apk
